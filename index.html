<!doctype html>
<html lang="en" class="h-full">
 <head>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #FFFFFF;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Chalkboard SE", "Marker Felt", cursive;
      color: #000000;
      font-weight: bold;
    }

    .title-font {
      font-family: "Courier New", Courier, monospace;
      font-weight: bold;
    }

    .retro-link {
      font-family: -apple-system, BlinkMacSystemFont, "Chalkboard SE", "Marker Felt", cursive;
      color: #0000EE;
      text-decoration: underline;
      cursor: pointer;
      font-size: 24px;
      display: inline-block;
      transition: color 0.1s;
    }

    .retro-link.small {
      font-size: 12px;
    }

    .retro-link:hover {
      color: #551A8B;
    }

    .retro-link:focus-visible {
      outline: 3px dotted #0000EE;
      outline-offset: 2px;
    }

    .blink {
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .fade-in {
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rainbow-flash {
      animation: rainbowFlash 0.8s infinite;
      font-weight: bold;
    }

    @keyframes rainbowFlash {
      0% { background-color: #FF0000; color: #FFFFFF; }
      16% { background-color: #FF7F00; color: #FFFFFF; }
      33% { background-color: #FFFF00; color: #000000; }
      50% { background-color: #00FF00; color: #000000; }
      66% { background-color: #0000FF; color: #FFFFFF; }
      83% { background-color: #4B0082; color: #FFFFFF; }
      100% { background-color: #9400D3; color: #FFFFFF; }
    }

    .gray-button {
      background-color: #CCCCCC;
      color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Chalkboard SE", "Marker Felt", cursive;
      border: 3px solid #000000;
      cursor: pointer;
      padding: 12px 32px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 8px;
      transition: all 0.1s;
    }

    .gray-button:hover {
      background-color: #AAAAAA;
    }

    .gray-button:active {
      transform: scale(0.98);
    }

    .gray-button:focus-visible {
      outline: 3px dotted #0000EE;
      outline-offset: 2px;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>

 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full flex items-center justify-center px-4 py-8 overflow-auto">
   <main class="w-full max-w-2xl text-center fade-in">
    <!-- Title -->
    <header class="mb-8">
     <p class="text-sm mb-2" style="font-family: 'Comic Sans MS', 'Comic Sans', cursive;">Return of the</p>

     </div>
    </header><!-- Intro Text -->
    <section class="mb-10">
     <p id="introText" class="text-xl leading-relaxed mb-6" style="font-family: 'Comic Sans MS', 'Comic Sans', cursive;">You're going diving! <span class="rainbow-flash" style="padding: 2px 4px;">Dumpster diving!</span> Click below to rummage through a glorious heap of forgotten treasures, nostalgic junk, and mildly cursed artifacts.</p>
    </section><!-- Enter Button (styled as gray button) -->

     <button id="enterLink" class="gray-button">Jump In and Start Diving</button>
    </section><!-- Footer -->
    <footer class="text-sm mt-12">

  <script>

    };

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          document.getElementById("introText").textContent = config.intro_text || defaultConfig.intro_text;
          document.getElementById("enterLink").textContent = config.button_text || defaultConfig.button_text;
          document.getElementById("footerText").textContent = config.footer_text || defaultConfig.footer_text;
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["intro_text", config.intro_text || defaultConfig.intro_text],
          ["button_text", config.button_text || defaultConfig.button_text],
          ["footer_text", config.footer_text || defaultConfig.footer_text]

    }

    // Sample treasure data (65 items)
    const treasures = [

      { name: "Melted M.U.S.C.L.E. Man", caption: "Once a champion of the ring. Now a pink puddle of defeat.", image: "melted-muscle-man.png" },
      { name: "Garbage Pail Kids Card", caption: "Still smells faintly of bubble gum and poor decisions.", image: "garbage-pail-card.png" },
      { name: "Fun Dip Packet", caption: "Just add saliva and childhood regret.", image: "fun-dip.png" },
      { name: "Cabbage Patch Kid", caption: "Adopted. Returned. Adopted again. It's been a journey.", image: "cabbage-patch-kid.png" },
      { name: "E.T. Atari Cartridge", caption: "Famously buried in the desert. This one crawled back.", image: "et-atari-game.png" },
      { name: "Bob's Big Boy Figurine", caption: "Still proudly holding that burger like it's 1959.", image: "bobs-big-boy.png" },
      { name: "Pizza Hut BTTF II Sunglasses", caption: "The future is… scratched.", image: "pizza-hut-bttf2-sunglasses.png" },
      { name: "Commodore 64 Tape Drive", caption: "Loading… still loading… please wait… forever.", image: "commodore64-tape-drive.png" },
      { name: "Dawson's Creek VHS (Episodes 1 & 2)", caption: "You don't want to wait… but you will.", image: "dawsons-creek-vhs.png" },
      { name: "Jingle All The Way VHS", caption: "Turbo Man not included.", image: "jingle-all-the-way-vhs.png" },
      { name: "Oregon Trail Floppy Disks", caption: "You have died of disk corruption.", image: "oregon-trail-floppies.png" },

      { name: "Hypercolor Shirt", caption: "It changed colors once. Then gave up.", image: "hypercolor-shirt.png" },
      { name: "Popped Pogo Ball", caption: "All bounce. No ball.", image: "pogo-ball.png" },
      { name: "Blue/Cyan 3D Glasses", caption: "For movies that were never actually 3D.", image: "blue-cyan-3d-glasses.png" }
    ];

    // Track which treasures have been seen in this session
    let seenTreasures = [];

    // Show treasure randomizer
    function showRandomizer() {
      // If all treasures have been seen, reset the list
      if (seenTreasures.length === treasures.length) {
        seenTreasures = [];
      }

      // Get remaining unseen treasures
      const unseenTreasures = treasures.filter((t, index) => !seenTreasures.includes(index));
      const randomIndex = Math.floor(Math.random() * unseenTreasures.length);
      const randomTreasure = unseenTreasures[randomIndex];
      
      // Mark this treasure as seen by storing its index
      const treasureIndex = treasures.indexOf(randomTreasure);
      seenTreasures.push(treasureIndex);
      const randomDumpster = getRandomDumpsterImage();
      const app = document.getElementById("app");
      
      app.innerHTML = `
        <div class="w-full max-w-2xl text-center fade-in">
          <header class="mb-8">
            <h1 class="title-font text-6xl sm:text-7xl font-black tracking-widest mb-6">Dumpster Diver</h1>
          </header>
          
          <main class="mb-8">
            <h2 class="title-font text-4xl font-bold mb-8" style="font-family: Impact, Arial Black, sans-serif;">${randomTreasure.name}</h2>
            
            <div class="flex justify-center mb-8">
              <img src="https://raw.githubusercontent.com/jimczad/dumsterdiver/main/${randomTreasure.image}" alt="${randomTreasure.name}" 
                   style="max-width: 300px; max-height: 300px; object-fit: contain;" 
                   loading="lazy"
                   onerror="this.style.background='#999999'; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Cdefs%3E%3Cstyle%3E.raccoon%7Bfill:%23333%7D.trash%7Bfill:%23666%7D%3C/style%3E%3C/defs%3E%3Ccircle cx=%22150%22 cy=%22100%22 r=%2240%22 class=%22raccoon%22/%3E%3Ccircle cx=%22130%22 cy=%2280%22 r=%2218%22 class=%22raccoon%22/%3E%3Ccircle cx=%22170%22 cy=%2280%22 r=%2218%22 class=%22raccoon%22/%3E%3Ccircle cx=%22120%22 cy=%2275%22 r=%226%22 fill=%22%23fff%22/%3E%3Ccircle cx=%22180%22 cy=%2275%22 r=%226%22 fill=%22%23fff%22/%3E%3Ccircle cx=%22118%22 cy=%2275%22 r=%223%22 fill=%22%23000%22/%3E%3Ccircle cx=%22182%22 cy=%2275%22 r=%223%22 fill=%22%23000%22/%3E%3Crect x=%2280%22 y=%22150%22 width=%22140%22 height=%2280%22 class=%22trash%22 stroke=%22%23000%22 stroke-width=%222%22/%3E%3Ctext x=%22150%22 y=%22200%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-size=%2224%22 font-weight=%22bold%22%3ETRASH%3C/text%3E%3C/svg%3E';" />
            </div>
            
            <p class="text-2xl mb-8 italic" style="font-family: 'Comic Sans MS', 'Comic Sans', cursive;">"${randomTreasure.caption}"</p>
            
            <div class="flex gap-6 justify-center flex-wrap">
              <a href="#" class="retro-link" id="diveAgainLink">Dive Again</a>
              <a href="#" class="retro-link" id="shareLink">Share This Treasure</a>
              <a href="#" class="retro-link" id="emailLink">Email This Treasure</a>
            </div>
            
            <div id="youveGotMailIcon" class="mt-4" style="display: none; font-size: 12px; font-family: 'Comic Sans MS', 'Comic Sans', cursive;">
              <span class="blink">📧</span> You've got mail!
            </div>
          </main>
          
          <footer class="text-sm mt-12">
            <p style="font-family: 'Comic Sans MS', 'Comic Sans', cursive;"><a href="#" class="retro-link" id="backLink">← Back to Home</a></p>
          </footer>
        </div>
      `;
      
      document.getElementById("diveAgainLink").addEventListener("click", (e) => {
        e.preventDefault();
        showRandomizer();
      });
      
      document.getElementById("shareLink").addEventListener("click", (e) => {
        e.preventDefault();
        const shareText = `Found: ${randomTreasure.name}\n\n"${randomTreasure.caption}"\n\nDumpster Diver - Found via Dumpster Diver`;
        if (navigator.share) {
          navigator.share({ title: randomTreasure.name, text: shareText });
        } else {
          alert(shareText);
        }
      });
      
      document.getElementById("emailLink").addEventListener("click", (e) => {
        e.preventDefault();
        generateShareCard(randomTreasure);
      });
      
      document.getElementById("backLink").addEventListener("click", (e) => {
        e.preventDefault();
        location.reload();
      });
    }

    // Generate share card and trigger email
    function generateShareCard(treasure) {
      const cardWidth = 600;
      const cardHeight = 500;
      
      // Create canvas for the share card
      const canvas = document.createElement("canvas");
      canvas.width = cardWidth;
      canvas.height = cardHeight;
      const ctx = canvas.getContext("2d");
      
      // Light gray background
      ctx.fillStyle = "#F2F2F2";
      ctx.fillRect(0, 0, cardWidth, cardHeight);
      
      // Draw border
      ctx.strokeStyle = "#000000";
      ctx.lineWidth = 3;
      ctx.strokeRect(0, 0, cardWidth, cardHeight);
      
      // Draw item name
      ctx.fillStyle = "#000000";
      ctx.font = "bold 32px Impact, Arial Black, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(treasure.name, cardWidth / 2, 50);
      
      // Create placeholder raccoon image inline
      const placeholderSvg = `data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22250%22 height=%22250%22%3E%3Cdefs%3E%3Cstyle%3E.raccoon%7Bfill:%23333%7D.trash%7Bfill:%23666%7D%3C/style%3E%3C/defs%3E%3Ccircle cx=%22125%22 cy=%2280%22 r=%2240%22 class=%22raccoon%22/%3E%3Ccircle cx=%22105%22 cy=%2260%22 r=%2218%22 class=%22raccoon%22/%3E%3Ccircle cx=%22145%22 cy=%2260%22 r=%2218%22 class=%22raccoon%22/%3E%3Ccircle cx=%2295%22 cy=%2255%22 r=%226%22 fill=%22%23fff%22/%3E%3Ccircle cx=%22155%22 cy=%2255%22 r=%226%22 fill=%22%23fff%22/%3E%3Ccircle cx=%2293%22 cy=%2255%22 r=%223%22 fill=%22%23000%22/%3E%3Ccircle cx=%22157%22 cy=%2255%22 r=%223%22 fill=%22%23000%22/%3E%3Crect x=%2260%22 y=%22130%22 width=%22140%22 height=%2280%22 class=%22trash%22 stroke=%22%23000%22 stroke-width=%222%22/%3E%3Ctext x=%22130%22 y=%22180%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-size=%2220%22 font-weight=%22bold%22%3ETRASH%3C/text%3E%3C/svg%3E`;
      
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        ctx.drawImage(img, (cardWidth - 200) / 2, 80, 200, 200);
        finalize();
      };
      img.onerror = () => {
        finalize();
      };
      img.src = placeholderSvg;
      
      function finalize() {
        // Draw caption
        ctx.fillStyle = "#000000";
        ctx.font = "italic 18px Times New Roman, Times, serif";
        ctx.textAlign = "center";
        
        // Word wrap caption
        const maxWidth = cardWidth - 40;
        const lineHeight = 25;
        const words = treasure.caption.split(" ");
        let line = "";
        let y = 310;
        
        words.forEach((word) => {
          const testLine = line + word + " ";
          const metrics = ctx.measureText(testLine);
          if (metrics.width > maxWidth && line) {
            ctx.fillText(line.trim(), cardWidth / 2, y);
            line = word + " ";
            y += lineHeight;
          } else {
            line = testLine;
          }
        });
        if (line) {
          ctx.fillText(line.trim(), cardWidth / 2, y);
        }
        
        // Draw footer
        ctx.fillStyle = "#666666";
        ctx.font = "italic 12px Times New Roman, Times, serif";
        ctx.fillText("Found via Dumpster Diver", cardWidth / 2, cardHeight - 20);
        
        // Convert to image and trigger email
        const imageData = canvas.toDataURL("image/png");
        triggerEmail(treasure, imageData);
      }
    }

    // Trigger email with share card
    function triggerEmail(treasure, imageData) {
      const subject = "Look what I found in the dumpster!";
      const body = `Check out this treasure I found on Dumpster Diver:\n\n"${treasure.caption}"\n\nImage attached.`;
      const mailto = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      
      // Show a fallback message since mailto doesn't support attachments
      const fallbackMessage = `📧 Share card generated!\n\nCopy this link to download the image:\n\n${imageData}\n\nThen attach it to an email with this message:\n\n${body}`;
      
      // Create a temporary download link for the image
      const downloadLink = document.createElement("a");
      downloadLink.href = imageData;
      downloadLink.download = `${treasure.name.replace(/\s+/g, "-").toLowerCase()}-treasure.png`;
      
      // Show the "You've got mail!" message
      const mailIcon = document.getElementById("youveGotMailIcon");
      if (mailIcon) {
        mailIcon.style.display = "block";
        setTimeout(() => {
          mailIcon.style.display = "none";
        }, 3000);
      }
      
      // Trigger download and open email
      downloadLink.click();
      window.open(mailto, "_blank");
    }

    // Handle button click
    document.getElementById("enterLink").addEventListener("click", (event) => {
      event.preventDefault();
      showRandomizer();
    });

    // Get random dumpster image
    function getRandomDumpsterImage() {
      const dumpsterCount = 8;
      const randomNum = Math.floor(Math.random() * dumpsterCount) + 1;
      return `https://raw.githubusercontent.com/jimczad/dumsterdiver/main/dumpster${randomNum}.png`;
    }

    // Load random dumpster image on page load
    document.addEventListener("DOMContentLoaded", () => {
      const dumpsterImg = document.getElementById("dumpsterImage");
      if (dumpsterImg) {
        dumpsterImg.src = getRandomDumpsterImage();
      }
    });
  </script>
